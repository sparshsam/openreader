[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "openreader-mcp"
version = "1.2.4"
description = "AI assistant tools for PDFs — read, search, compare, merge, split, compress, and index PDFs locally."
readme = "README.md"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "Sparsh Sam" }]
requires-python = ">=3.10"
dependencies = [
    "PyMuPDF>=1.23.0",
    "mcp>=1.0.0",
]
keywords = ["pdf", "mcp", "ai", "claude", "chatgpt", "llm"]

[project.urls]
Homepage = "https://reader.kovina.org"
Repository = "https://github.com/sparshsam/openreader"
Documentation = "https://reader.kovina.org/docs"

[project.scripts]
openreader-mcp = "openreader_mcp.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
