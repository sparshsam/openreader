name: Build macOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch-label: Apple-Silicon
            artifact-prefix: PDFReader-by-Sparsh-macOS-Apple-Silicon
          - runner: macos-15-intel
            arch-label: Intel
            artifact-prefix: PDFReader-by-Sparsh-macOS-Intel

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inject version from git tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          python3 scripts/inject_version.py "$VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build app bundle (PyInstaller)
        run: |
          QT_QPA_PLATFORM=offscreen python tools/create_icon.py --png-iconset assets/AppIcon.iconset
          iconutil -c icns assets/AppIcon.iconset -o assets/pdfreader_by_sparsh.icns
          pyinstaller --windowed --onedir --clean --noupx --name "PDFReader by Sparsh" --argv-emulation --icon "assets/pdfreader_by_sparsh.icns" --workpath "build/pyinstaller" main.py

      - name: Package app bundle (ZIP — updater canonical)
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/PDFReader by Sparsh.app" "${{ matrix.artifact-prefix }}.zip"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-prefix }}
          path: ${{ matrix.artifact-prefix }}.zip

      - name: Install create-dmg for DMG packaging
        run: |
          if command -v brew >/dev/null 2>&1; then
            brew install create-dmg
          else
            echo "Homebrew not available on this runner — skipping DMG"
            echo "DMG_SKIPPED=true" >> "$GITHUB_ENV"
          fi

      - name: Build DMG (polished installer)
        if: env.DMG_SKIPPED != 'true'
        run: |
          VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0-dev")"
          VERSION="${VERSION#v}"
          chmod +x scripts/create_dmg.sh
          ./scripts/create_dmg.sh "$VERSION"
          echo "DMG_BUILT=true" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-prefix }}-DMG
          path: dist/*.dmg
