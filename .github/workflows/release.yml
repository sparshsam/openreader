name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release Asset
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inject version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/inject_version.py "$VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Windows app
        run: |
          pyinstaller --noconsole --onedir --noupx --name "PDFReader by Sparsh" --icon ".\assets\pdfreader_by_sparsh.ico" main.py

      - name: Package Windows ZIP
        run: |
          Compress-Archive -Path "dist\PDFReader by Sparsh\*" -DestinationPath "PDFReader-by-Sparsh-Windows.zip"

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: PDFReader-by-Sparsh-Windows.zip

  build-macos:
    name: Build macOS Release Asset
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            asset-name: PDFReader-by-Sparsh-macOS-Apple-Silicon.zip
          - runner: macos-15-intel
            asset-name: PDFReader-by-Sparsh-macOS-Intel.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/inject_version.py "$VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build macOS app
        run: |
          QT_QPA_PLATFORM=offscreen python tools/create_icon.py --png-iconset assets/AppIcon.iconset
          iconutil -c icns assets/AppIcon.iconset -o assets/pdfreader_by_sparsh.icns
          pyinstaller --windowed --onedir --noupx --name "PDFReader by Sparsh" --argv-emulation --icon "assets/pdfreader_by_sparsh.icns" main.py

      - name: Package macOS ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/PDFReader by Sparsh.app" "${{ matrix.asset-name }}"

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset-name }}
          path: ${{ matrix.asset-name }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Verify release asset names
        run: |
          test -f "release-assets/PDFReader-by-Sparsh-Windows.zip"
          test -f "release-assets/PDFReader-by-Sparsh-macOS-Apple-Silicon.zip"
          test -f "release-assets/PDFReader-by-Sparsh-macOS-Intel.zip"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "PDFReader by Sparsh $GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME. Packaged builds include the tag-injected app version and canonical updater asset names."
