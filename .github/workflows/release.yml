name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release Asset
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inject version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/inject_version.py "$VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Windows app
        run: |
          pyinstaller --noconsole --onedir --noupx --name "PDFReader by Sparsh" --add-data "assets;assets" --icon ".\assets\pdfreader_by_sparsh.ico" main.py

      - name: Package Windows ZIP
        run: |
          Compress-Archive -Path "dist\PDFReader by Sparsh\*" -DestinationPath "PDFReader-by-Sparsh-Windows.zip"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "$env:GITHUB_REF_NAME" -replace "^v", ""

          Write-Host "=== Installing Inno Setup ==="
          choco install innosetup --no-progress --limit-output -y 2>&1
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 1641 -and $LASTEXITCODE -ne 3010) {
            throw "Chocolatey install failed with exit code $LASTEXITCODE"
          }
          refreshenv

          Write-Host "=== Locating ISCC.exe ==="
          $iscc = (Get-Command "iscc.exe" -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $paths = @(
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
              "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
            )
            foreach ($p in $paths) { if (Test-Path $p) { $iscc = $p; break } }
          }
          if (-not $iscc) { throw "ISCC.exe not found" }
          Write-Host "Using ISCC: $iscc"

          Write-Host "=== Building installer via ISCC ==="
          $srcDir = (Get-Item "dist\PDFReader by Sparsh").FullName
          Write-Host "Source dir: $srcDir"
          & $iscc /Q "/DAppVersion=$version" "/DAppSourceDir=$srcDir" installer/setup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC exited with code $LASTEXITCODE" }

          $expected = "PDFReader-by-Sparsh-$version-Setup.exe"
          if (Test-Path $expected) {
            Copy-Item $expected "PDFReader-by-Sparsh-Setup.exe"
            Write-Host "=== SUCCESS: PDFReader-by-Sparsh-Setup.exe built ==="
          } else {
            throw "Setup.exe not found at $expected"
          }

      - name: Build MSIX package (unsigned — requires manual signing for distribution)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Locate MakeAppx.exe
          $makeAppx = Get-Command "MakeAppx.exe" -ErrorAction SilentlyContinue
          if (-not $makeAppx) {
            $sdkPaths = @(
              "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\MakeAppx.exe",
              "${env:ProgramFiles}\Microsoft SDKs\ClickOnce\signtool\MakeAppx.exe"
            )
            foreach ($pattern in $sdkPaths) {
              $found = Get-ChildItem $pattern -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
              if ($found) { $makeAppx = $found; break }
            }
          }

          if (-not $makeAppx) {
            Write-Host "MakeAppx.exe not found — skipping MSIX build."
            Write-Host "Install Windows SDK or Visual Studio Build Tools for MSIX support."
            "MSIX_SKIPPED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 0
          }

          $version = "$env:GITHUB_REF_NAME" -replace "^v", ""
          $stageDir = "_msix_staging"
          if (Test-Path $stageDir) { Remove-Item -Recurse -Force $stageDir }
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null

          # Copy app files
          Copy-Item -Path "dist\PDFReader by Sparsh\*" -Destination $stageDir -Recurse -Force

          # Copy and patch manifest
          Copy-Item -Path "packaging\msix\AppxManifest.xml" -Destination "$stageDir\AppxManifest.xml" -Force
          (Get-Content "$stageDir\AppxManifest.xml") -replace 'Version="[^"]+"', "Version=`"$version.0`"" | Set-Content "$stageDir\AppxManifest.xml"

          # Create assets directory
          $assetDir = "$stageDir\assets"
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          # Build MSIX (unsigned)
          $msixName = "PDFReader-by-Sparsh.msix"
          & $makeAppx.Source pack /p $msixName /d $stageDir /l
          if ($LASTEXITCODE -ne 0) { throw "MakeAppx failed with exit code $LASTEXITCODE" }
          Write-Host "=== MSIX built: $msixName (unsigned) ==="

          # Also generate the AppInstaller file with the correct version
          $installerPath = "packaging\msix\AppInstaller.xml"
          (Get-Content $installerPath) -replace 'Version="[^"]+"', "Version=`"$version.0`"" | Set-Content "PDFReader-by-Sparsh.appinstaller"

          # Clean up
          Remove-Item -Recurse -Force $stageDir

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            PDFReader-by-Sparsh-Windows.zip
            PDFReader-by-Sparsh-Setup.exe
            PDFReader-by-Sparsh.msix

  build-macos:
    name: Build macOS Release Asset
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            asset-name: PDFReader-by-Sparsh-macOS-Apple-Silicon.zip
          - runner: macos-15-intel
            asset-name: PDFReader-by-Sparsh-macOS-Intel.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/inject_version.py "$VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build macOS app
        run: |
          QT_QPA_PLATFORM=offscreen python tools/create_icon.py --png-iconset assets/AppIcon.iconset
          iconutil -c icns assets/AppIcon.iconset -o assets/pdfreader_by_sparsh.icns
          pyinstaller --windowed --onedir --noupx --name "PDFReader by Sparsh" --argv-emulation --icon "assets/pdfreader_by_sparsh.icns" main.py

      - name: Package macOS ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/PDFReader by Sparsh.app" "${{ matrix.asset-name }}"

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset-name }}
          path: ${{ matrix.asset-name }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Verify required assets exist
        run: |
          echo "=== Release assets ==="
          ls -la release-assets/
          test -f "release-assets/PDFReader-by-Sparsh-Windows.zip" || { echo "Missing Windows ZIP"; exit 1; }
          test -f "release-assets/PDFReader-by-Sparsh-Setup.exe" || { echo "Missing Windows Setup.exe"; exit 1; }
          test -f "release-assets/PDFReader-by-Sparsh-macOS-Apple-Silicon.zip" || { echo "Missing macOS Apple Silicon ZIP"; exit 1; }
          test -f "release-assets/PDFReader-by-Sparsh-macOS-Intel.zip" || { echo "Missing macOS Intel ZIP"; exit 1; }
          # MSIX is optional until signing is set up; warn if missing
          if [ -f "release-assets/PDFReader-by-Sparsh.msix" ]; then
            echo "MSIX package found — will attach to release"
          else
            echo "⚠️  MSIX package not found — MakeAppx.exe may not be available on this runner"
          fi
          echo "All required assets verified"

      - name: Generate release notes
        run: |
          cat > /tmp/release-notes.md <<- NOTE_EOF
          Release ${GITHUB_REF_NAME}.

          ## MSIX Distribution (v1.2.0+)

          Starting with v1.2.0, Windows distribution is migrating to MSIX/App Installer.
          In-app self-updating (downloading and running Setup.exe) has been removed.
          Update responsibility belongs to Windows packaging, not the app itself.

          ### Assets for Windows
          - **\`PDFReader-by-Sparsh.msix\`** — ✅ **Recommended for v1.2.0+.** MSIX package with App Installer support for automatic Windows-managed updates. No admin required for per-user install when signed. *(Currently unsigned — requires Windows Developer Mode for sideloading until code signing is procured.)*
          - **\`PDFReader-by-Sparsh-Setup.exe\`** — ✅ **Legacy fallback.** Inno Setup installer with PDF file association, Start Menu shortcut, desktop shortcut, and Add/Remove Programs entry. Requires admin rights.
          - \`PDFReader-by-Sparsh-Windows.zip\` — Portable/manual recovery package. Use only if you need a portable copy or are following SUPPORT.md recovery steps.

          ### Assets for macOS
          - \`PDFReader-by-Sparsh-macOS-Apple-Silicon.zip\` — macOS Apple Silicon app bundle.
          - \`PDFReader-by-Sparsh-macOS-Intel.zip\` — macOS Intel app bundle.

          Packaged builds include the tag-injected app version and canonical release asset names.
          NOTE_EOF

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "PDFReader by Sparsh $GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md
