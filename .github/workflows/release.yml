name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release Asset
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inject version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/inject_version.py "$VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Windows app
        run: |
          pyinstaller --noconsole --onedir --noupx --name "PDFReader by Sparsh" --icon ".\assets\pdfreader_by_sparsh.ico" main.py

      - name: Package Windows ZIP
        run: |
          Compress-Archive -Path "dist\PDFReader by Sparsh\*" -DestinationPath "PDFReader-by-Sparsh-Windows.zip"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "$env:GITHUB_REF_NAME" -replace "^v", ""

          Write-Host "=== Installing Inno Setup ==="
          choco install innosetup --no-progress --limit-output -y 2>&1
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 1641 -and $LASTEXITCODE -ne 3010) {
            throw "Chocolatey install failed with exit code $LASTEXITCODE"
          }
          refreshenv

          Write-Host "=== Locating ISCC.exe ==="
          $iscc = (Get-Command "iscc.exe" -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $paths = @(
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
              "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
            )
            foreach ($p in $paths) { if (Test-Path $p) { $iscc = $p; break } }
          }
          if (-not $iscc) { throw "ISCC.exe not found" }
          Write-Host "Using ISCC: $iscc"

          Write-Host "=== Building installer via ISCC ==="
          $srcDir = (Get-Item "dist\PDFReader by Sparsh").FullName
          Write-Host "Source dir: $srcDir"
          & $iscc /Q "/DAppVersion=$version" "/DAppSourceDir=$srcDir" installer/setup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC exited with code $LASTEXITCODE" }

          $expected = "PDFReader-by-Sparsh-$version-Setup.exe"
          if (Test-Path $expected) {
            Copy-Item $expected "PDFReader-by-Sparsh-Setup.exe"
            Write-Host "=== SUCCESS: PDFReader-by-Sparsh-Setup.exe built ==="
          } else {
            throw "Setup.exe not found at $expected"
          }

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            PDFReader-by-Sparsh-Windows.zip
            PDFReader-by-Sparsh-Setup.exe

  build-macos:
    name: Build macOS Release Asset
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            asset-name: PDFReader-by-Sparsh-macOS-Apple-Silicon.zip
          - runner: macos-15-intel
            asset-name: PDFReader-by-Sparsh-macOS-Intel.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/inject_version.py "$VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build macOS app
        run: |
          QT_QPA_PLATFORM=offscreen python tools/create_icon.py --png-iconset assets/AppIcon.iconset
          iconutil -c icns assets/AppIcon.iconset -o assets/pdfreader_by_sparsh.icns
          pyinstaller --windowed --onedir --noupx --name "PDFReader by Sparsh" --argv-emulation --icon "assets/pdfreader_by_sparsh.icns" main.py

      - name: Package macOS ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/PDFReader by Sparsh.app" "${{ matrix.asset-name }}"

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset-name }}
          path: ${{ matrix.asset-name }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Verify required assets exist
        run: |
          echo "=== Release assets ==="
          ls -la release-assets/
          test -f "release-assets/PDFReader-by-Sparsh-Windows.zip" || { echo "Missing Windows ZIP"; exit 1; }
          test -f "release-assets/PDFReader-by-Sparsh-macOS-Apple-Silicon.zip" || { echo "Missing macOS Apple Silicon ZIP"; exit 1; }
          test -f "release-assets/PDFReader-by-Sparsh-macOS-Intel.zip" || { echo "Missing macOS Intel ZIP"; exit 1; }
          if test -f "release-assets/PDFReader-by-Sparsh-Setup.exe"; then
            echo "Windows Setup.exe: present"
          else
            echo "Windows Setup.exe: not built (Inno Setup may be unavailable)"
          fi
          echo "All required assets verified"

      - name: Generate release notes
        run: |
          cat > /tmp/release-notes.md <<- NOTE_EOF
          Release ${GITHUB_REF_NAME}.

          ### Assets
          - \`PDFReader-by-Sparsh-Windows.zip\` — Folder-based Windows app (EXE + _internal/). Extract and run.
          - \`PDFReader-by-Sparsh-Setup.exe\` — Windows Inno Setup installer (file association, Start Menu, uninstall).
          - \`PDFReader-by-Sparsh-macOS-Apple-Silicon.zip\` — macOS Apple Silicon app bundle.
          - \`PDFReader-by-Sparsh-macOS-Intel.zip\` — macOS Intel app bundle.

          Packaged builds include the tag-injected app version and canonical updater asset names.
          NOTE_EOF

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "PDFReader by Sparsh $GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md
