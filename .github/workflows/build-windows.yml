name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Inject version from git tag
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0-dev")
          VERSION="${VERSION#v}"
          python scripts/inject_version.py "$VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --noconsole --onefile --noupx --name "PDFReader by Sparsh" --icon ".\assets\pdfreader_by_sparsh.ico" main.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFReader-by-Sparsh-Windows
          path: dist/PDFReader by Sparsh.exe
