name: Feature Request
description: Suggest an idea for PDFReader by Sparsh
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Check the [ROADMAP.md](https://github.com/sparshsam/pdfreader-by-sparsh/blob/main/ROADMAP.md) first — your idea may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What workflow is currently missing or painful?
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would the feature look like or how would it work?
      placeholder: "Add a toolbar button that [...]"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope Check
      options:
        - label: This feature keeps PDFs local (no network services).
          required: true
        - label: This feature preserves the native desktop feel.
          required: false
